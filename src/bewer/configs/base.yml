      split_on_escaped: "-/'"
  legacy:
    bewer.preprocessing.tokenization.whitespace_pattern:

normalizers:
  default:
    bewer.preprocessing.normalization.lowercase:
    bewer.preprocessing.normalization.transliterate_latin_letters:
